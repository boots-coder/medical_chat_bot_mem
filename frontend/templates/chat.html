<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Medical Consultation - {{ patient_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto max-w-4xl p-4">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <!-- Header Information -->
            <div class="border-b pb-4 mb-4">
                <h1 class="text-2xl font-bold text-gray-800">Online Medical Consultation</h1>
                <p class="text-gray-600 mt-2">
                    Patient: {{ patient_name }} |
                    Doctor: {{ doctor_name }} ({{ department }})
                </p>
            </div>

            <!-- Chat Message Area -->
            <div id="chat-messages" class="h-96 overflow-y-auto mb-4 p-4 bg-gray-50 rounded">
                <div class="text-center text-gray-500 text-sm">
                    Welcome! Please describe your symptoms or concerns
                </div>
            </div>

            <!-- Input Area -->
            <div class="flex gap-2">
                <input
                    id="message-input"
                    type="text"
                    class="flex-1 border rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter your question..."
                    onkeypress="if(event.key==='Enter') sendMessage()"
                >
                <button
                    onclick="sendMessage()"
                    class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600 transition"
                >
                    Send
                </button>
                <button
                    onclick="endSession()"
                    class="bg-red-500 text-white px-6 py-2 rounded hover:bg-red-600 transition"
                >
                    End Session
                </button>
            </div>

            <!-- Connection Status Indicator -->
            <div id="connection-status" class="mt-2 text-sm text-gray-500">
                <span id="status-text">Connecting...</span>
            </div>
        </div>
    </div>

    <script>
        const sessionId = '{{ session_id }}';
        const wsPort = {{ ws_port }};
    </script>
    <script src="/static/js/chat.js"></script>
</body>
</html>
